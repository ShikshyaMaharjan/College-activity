<html lang="en">
<body>
    <script>
        // Find the Factorial of a Number using JavaScript
        const num = parseInt(prompt("Enter a number: "));
        let factorial = 1;
        for (let i = 1; i <= num; i++) {
            factorial *= i;
        }
        document.write("The factorial of " + num + " is " + factorial);
    </script>

</body>

</html>
